<!DOCTYPE html><html lang='pt-BR'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1,maximum-scale=1'><title>Dashboard Cobranças Mobile</title><style>*{box-sizing:border-box}body{font-family:Arial;margin:0;background:#eef2f7;padding:12px}.container{max-width:1100px;margin:auto}.card{background:#fff;border-radius:18px;padding:14px;box-shadow:0 4px 16px rgba(0,0,0,.08);margin-bottom:14px}.note{font-size:13px;background:#eefaf0;padding:10px;border-radius:10px}h1{font-size:22px}input,button,select{padding:14px;font-size:16px;width:100%;margin:6px 0;border-radius:12px;border:1px solid #ccc}button{background:#111;color:#fff;font-weight:bold}.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}.metric{padding:14px;border-radius:16px;background:#f8f8f8;text-align:center;font-size:18px;font-weight:bold}.ok{border-left:6px solid green}.late{border-left:6px solid red}.pend{border-left:6px solid orange}.all{border-left:6px solid #111}.listas{display:grid;grid-template-columns:1fr 1fr;gap:14px}.cliente{padding:12px;border-radius:12px;margin:10px 0;background:#f7f7f7}.verde{border-left:6px solid green}.vermelho{border-left:6px solid red}@media(max-width:900px){.grid{grid-template-columns:1fr 1fr}}@media(max-width:600px){.grid,.listas{grid-template-columns:1fr}}</style></head><body><div class='container'><div class='card'><h1>Dashboard Clientes e Cobranças</h1><div class='note'>✓ Dados salvam automaticamente no navegador/celular (localStorage). Mesmo fechando a página, as informações permanecem neste aparelho.</div><input id='cliente' placeholder='Nome do cliente'><input id='valor' placeholder='Mensalidade'><input id='pix' placeholder='Chave Pix'><select id='dia'><option value='5'>Vencimento dia 5</option><option value='10'>Vencimento dia 10</option><option value='15'>Vencimento dia 15</option><option value='20'>Vencimento dia 20</option></select><button onclick='add()'>Adicionar Cliente</button><button onclick='exportar()'>Exportar Backup</button><button onclick='limpar()'>Limpar Dados</button></div><div class='card'><div class='grid'><div class='metric all'>Clientes<br><span id='t1'>0</span></div><div class='metric ok'>Em dia<br><span id='t2'>0</span></div><div class='metric late'>Atrasados<br><span id='t3'>0</span></div><div class='metric pend'>Receber<br>R$ <span id='t4'>0</span></div></div></div><div class='card listas'><div><h2>Clientes em Dia</h2><div id='emdia'></div></div><div><h2>Pendentes/Atrasados</h2><div id='atrasados'></div></div></div></div><script>let c=JSON.parse(localStorage.getItem('dbpix')||'[]');function mes(){return new Date().getMonth()}function status(x){let h=new Date();let v=new Date(h.getFullYear(),h.getMonth(),parseInt(x.v));if(x.p==mes())return 'ok';if(h>v)return 'late';return 'pend'}function add(){if(!cliente.value||!valor.value)return;c.push({n:cliente.value,val:valor.value,pix:pix.value,v:dia.value,p:''});cliente.value='';valor.value='';pix.value='';save()}function pagar(i){c[i].p=mes();save()}function save(){localStorage.setItem('dbpix',JSON.stringify(c));render()}function limpar(){if(confirm('Apagar todos dados?')){c=[];save()}}function exportar(){let dados='data:text/json;charset=utf-8,'+encodeURIComponent(JSON.stringify(c));let a=document.createElement('a');a.href=dados;a.download='backup_clientes.json';a.click()}function render(){let ok='',late='';let em=0,at=0,total=0;c.forEach((x,i)=>{let s=status(x);if(s=='ok'){em++;ok+=`<div class='cliente verde'><b>${x.n}</b><br>R$ ${x.val}<br><button onclick='pagar(${i})'>Pago</button></div>`}else{at++;total+=Number(x.val);late+=`<div class='cliente vermelho'><b>${x.n}</b><br>R$ ${x.val}<br>${s=='late'?'Atrasado':'Pendente'}<br><button onclick='pagar(${i})'>Marcar Pago</button></div>`}});emdia.innerHTML=ok||'Nenhum cliente em dia';atrasados.innerHTML=late||'Nenhuma cobrança pendente';t1.innerText=c.length;t2.innerText=em;t3.innerText=at;t4.innerText=total.toFixed(2)}render()</script></body></html>
