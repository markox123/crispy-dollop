<!DOCTYPE html><html lang='pt-BR'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Dashboard Cobranças Pix</title><style>*{box-sizing:border-box}body{font-family:Arial;margin:0;background:#eef2f7;padding:12px}.container{max-width:1100px;margin:auto}.card{background:#fff;border-radius:18px;padding:14px;box-shadow:0 4px 16px rgba(0,0,0,.08);margin-bottom:14px}input,button,select{padding:14px;font-size:16px;width:100%;margin:6px 0;border-radius:12px;border:1px solid #ccc}button{background:#111;color:#fff;font-weight:bold}.rowbtn{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px}.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}.metric{padding:14px;border-radius:16px;background:#f8f8f8;text-align:center;font-weight:bold}.listas{display:grid;grid-template-columns:1fr 1fr;gap:14px}.cliente{padding:12px;border-radius:12px;margin:10px 0;background:#f7f7f7;cursor:pointer}.verde{border-left:6px solid green}.vermelho{border-left:6px solid red}.small{font-size:13px;color:#555}.acoes{display:none;margin-top:10px;padding-top:10px;border-top:1px solid #ddd}@media(max-width:700px){.grid,.listas{grid-template-columns:1fr}}</style></head><body><div class='container'><div class='card'><h1>Dashboard Clientes e Cobranças</h1><input id='cliente' placeholder='Nome do cliente'><input id='telefone' placeholder='Telefone WhatsApp (5594...)'><input id='valor' placeholder='Mensalidade'><select id='dia'><option value=''>Sem data</option><option value='1'>1</option><option value='3'>3</option><option value='5'>5</option><option value='6'>6</option><option value='7'>7</option><option value='8'>8</option><option value='12'>12</option><option value='14'>14</option><option value='15'>15</option><option value='16'>16</option><option value='17'>17</option><option value='18'>18</option><option value='21'>21</option><option value='22'>22</option><option value='23'>23</option><option value='24'>24</option><option value='28'>28</option></select><button onclick='add()'>Adicionar Cliente</button></div><div class='card'><div class='grid'><div class='metric'>Clientes<br><span id='t1'>0</span></div><div class='metric'>Em dia<br><span id='t2'>0</span></div><div class='metric'>Atrasados<br><span id='t3'>0</span></div><div class='metric'>Receber<br>R$ <span id='t4'>0</span></div></div></div><div class='card listas'><div><h2>Ativos/Em Dia</h2><div id='emdia'></div></div><div><h2>Pendentes/Atrasados</h2><div id='atrasados'></div></div></div></div><script>function baseClientes(){return[{n:'Vizinha',tel:'',ult:'04/2026',val:'100',v:'7',p:''},{n:'Cleiton',tel:'',val:'100',v:'28',p:''},{n:'Whynes Banca',tel:'',val:'100',v:'1',p:''},{n:'Lava Jato PIT BULL',tel:'',val:'200',v:'3',p:''},{n:'Igreja',tel:'',val:'100',v:'18',p:''},{n:'Oka Pizzaria',tel:'',val:'120',v:'6',p:''},{n:'Fran',tel:'',val:'100',v:'17',p:''},{n:'Índio Invasão',tel:'',val:'100',v:'22',p:''},{n:'Fernanda Invasão',tel:'',val:'100',v:'6',p:''},{n:'Renato',tel:'',val:'100',v:'1',p:''},{n:'José Rita',tel:'',val:'150',v:'23',p:''},{n:'Pamela',tel:'',val:'100',v:'8',p:''},{n:'Maria Severine Invasão',tel:'',val:'100',v:'16',p:''},{n:'Janeide',tel:'',val:'100',v:'22',p:''},{n:'Augusto',tel:'',val:'100',v:'7',p:''},{n:'Sônia',tel:'',val:'70',v:'6',p:''},{n:'Manoel Zona Rural',tel:'',val:'130',v:'',p:''},{n:'Lázaro Zona Rural',tel:'',val:'130',v:'',p:''},{n:'Milena',tel:'',val:'100',v:'12',p:''},{n:'Kathucia G5',tel:'',val:'100',v:'23',p:''},{n:'Dina delivery',tel:'',val:'120',v:'28',p:''},{n:'Simone Aragão',tel:'',val:'100',v:'15',p:''},{n:'Roberta Cell',tel:'',val:'100',v:'14',p:''},{n:'Vicente Araújo',tel:'',val:'100',v:'21',p:''},{n:'Leandro marcenaria',tel:'',val:'100',v:'24',p:''}]}
let c=JSON.parse(localStorage.getItem('dbpix_click')||'null')||baseClientes();function mes(){return new Date().getMonth()}function status(x){if(x.cancelado)return 'cancelado';if(x.p===mes())return 'ok';if(!x.v)return 'pend';let h=new Date();let v=new Date(h.getFullYear(),h.getMonth(),parseInt(x.v));if(h>v)return 'late';return 'pend'}function save(){localStorage.setItem('dbpix_click',JSON.stringify(c));render()}function add(){if(!cliente.value||!valor.value)return;let ref=prompt('Referência dívida','');c.push({n:cliente.value,tel:telefone.value||'',val:valor.value,v:dia.value,p:'',ult:ref||''});cliente.value='';telefone.value='';valor.value='';save()}function pagar(i){c[i].p=mes();save()}function cobrar(i){let x=c[i];let msg=encodeURIComponent('Olá '+x.n+', cobrança ref '+(x.ult||'')+' valor R$ '+x.val);let num=(x.tel||'').replace(/\D/g,'');if(num){window.open('https://wa.me/'+num+'?text='+msg,'_blank')}else{window.open('https://wa.me/?text='+msg,'_blank')}}function editarRef(i){let n=prompt('Editar dívida',c[i].ult||'');if(n!==null){c[i].ult=n;save()}}function editarTel(i){let n=prompt('Editar telefone WhatsApp',c[i].tel||'');if(n!==null){c[i].tel=n;save()}}function cancelar(i){c[i].cancelado=true;save()}function toggle(i){let el=document.getElementById('a'+i);el.style.display=el.style.display==='block'?'none':'block'}function render(){let ok='',late='';let em=0,at=0,total=0;for(let i=0;i<c.length;i++){let x=c[i];if(x.cancelado)continue;let s=status(x);let venc=x.v?('Vencimento: dia '+x.v):'Sem data';let ref=x.ult||'não definida';let tel=x.tel||'não cadastrado';let base=`<div class='cliente ${s==='ok'?'verde':'vermelho'}' onclick='toggle(${i})'><b>${x.n}</b><br><span class='small'>${venc}</span><br><span class='small'>Ref dívida: ${ref}</span><br><span class='small'>WhatsApp: ${tel}</span><div class='acoes' id='a${i}'><div class='rowbtn'><button onclick='event.stopPropagation();cobrar(${i})'>Cobrar</button><button onclick='event.stopPropagation();pagar(${i})'>Pago</button><button onclick='event.stopPropagation();editarRef(${i})'>Editar Dívida</button><button onclick='event.stopPropagation();editarTel(${i})'>Editar Telefone</button><button onclick='event.stopPropagation();cancelar(${i})'>Cancelar</button></div></div></div>`;if(s==='ok'){em++;ok+=base}else{at++;total+=Number(x.val||0);late+=base}}emdia.innerHTML=ok||'Nenhum';atrasados.innerHTML=late||'Nenhum';t1.innerText=c.filter(x=>!x.cancelado).length;t2.innerText=em;t3.innerText=at;t4.innerText=total.toFixed(2)}render();</script></body></html>
