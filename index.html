<!DOCTYPE html><html lang='pt-BR'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Dashboard Cobranças Pix</title><style>*{box-sizing:border-box}body{font-family:Arial;margin:0;background:#eef2f7;padding:12px}.container{max-width:1100px;margin:auto}.card{background:#fff;border-radius:18px;padding:14px;box-shadow:0 4px 16px rgba(0,0,0,.08);margin-bottom:14px}input,button,select{padding:14px;font-size:16px;width:100%;margin:6px 0;border-radius:12px;border:1px solid #ccc}button{background:#111;color:#fff;font-weight:bold}.rowbtn{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:8px}.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}.metric{padding:14px;border-radius:16px;background:#f8f8f8;text-align:center;font-weight:bold}.listas{display:grid;grid-template-columns:1fr 1fr;gap:14px}.cliente{padding:12px;border-radius:12px;margin:10px 0;background:#f7f7f7}.verde{border-left:6px solid green}.vermelho{border-left:6px solid red}.cancelado{border-left:6px solid gray;opacity:.7}.small{font-size:13px;color:#555}@media(max-width:700px){.grid,.listas,.rowbtn{grid-template-columns:1fr}}</style></head><body><div class='container'><div class='card'><h1>Dashboard Clientes e Cobranças</h1><input id='cliente' placeholder='Nome do cliente'><input id='valor' placeholder='Mensalidade'><select id='dia'><option value=''>Sem data</option><option value='1'>1</option><option value='3'>3</option><option value='5'>5</option><option value='6'>6</option><option value='7'>7</option><option value='8'>8</option><option value='12'>12</option><option value='14'>14</option><option value='15'>15</option><option value='16'>16</option><option value='17'>17</option><option value='18'>18</option><option value='21'>21</option><option value='22'>22</option><option value='23'>23</option><option value='24'>24</option><option value='28'>28</option></select><button onclick='add()'>Adicionar Cliente</button><button onclick='resetBase()'>Recarregar Clientes Base</button><button onclick='exportar()'>Exportar Backup</button></div><div class='card'><div class='grid'><div class='metric'>Clientes<br><span id='t1'>0</span></div><div class='metric'>Em dia<br><span id='t2'>0</span></div><div class='metric'>Atrasados<br><span id='t3'>0</span></div><div class='metric'>Receber<br>R$ <span id='t4'>0</span></div></div></div><div class='card listas'><div><h2>Ativos/Em Dia</h2><div id='emdia'></div></div><div><h2>Pendentes/Atrasados</h2><div id='atrasados'></div></div></div></div><script>function baseClientes(){return[{n:'Vizinha',ult:'04/2026',val:'100',v:'7',p:''},{n:'Cleiton',val:'100',v:'28',p:''},{n:'Whynes Banca',val:'100',v:'1',p:''},{n:'Lava Jato PIT BULL',val:'200',v:'3',p:''},{n:'Igreja',val:'100',v:'18',p:''},{n:'Oka Pizzaria',val:'120',v:'6',p:''},{n:'Fran',val:'100',v:'17',p:''},{n:'Índio Invasão',val:'100',v:'22',p:''},{n:'Fernanda Invasão',val:'100',v:'6',p:''},{n:'Renato',val:'100',v:'1',p:''},{n:'José Rita',val:'150',v:'23',p:''},{n:'Pamela',val:'100',v:'8',p:''},{n:'Maria Severine Invasão',val:'100',v:'16',p:''},{n:'Janeide',val:'100',v:'22',p:''},{n:'Augusto',val:'100',v:'7',p:''},{n:'Sônia',val:'70',v:'6',p:''},{n:'Manoel Zona Rural',val:'130',v:'',p:''},{n:'Lázaro Zona Rural',val:'130',v:'',p:''},{n:'Milena',val:'100',v:'12',p:''},{n:'Kathucia G5',val:'100',v:'23',p:''},{n:'Dina delivery',val:'120',v:'28',p:''},{n:'Simone Aragão',val:'100',v:'15',p:''},{n:'Roberta Cell',val:'100',v:'14',p:''},{n:'Vicente Araújo',val:'100',v:'21',p:''},{n:'Leandro marcenaria',val:'100',v:'24',p:''}]}
let c=JSON.parse(localStorage.getItem('dbpix2')||'null')||baseClientes();
function mes(){return new Date().getMonth()}
function status(x){if(x.cancelado)return 'cancelado';if(x.p===mes())return 'ok';if(!x.v)return 'pend';let h=new Date();let v=new Date(h.getFullYear(),h.getMonth(),parseInt(x.v));if(h>v)return 'late';return 'pend'}
function save(){localStorage.setItem('dbpix2',JSON.stringify(c));render()}
function resetBase(){if(confirm('Substituir pela base padrão?')){c=baseClientes();save()}}
function add(){if(!cliente.value||!valor.value)return;let ref=prompt('Referência da dívida (ex: 03/2026 ou Jan/2026)','');c.push({n:cliente.value,val:valor.value,v:dia.value,p:'',ult:ref||'',cancelado:false});cliente.value='';valor.value='';save()}
function pagar(i){c[i].p=mes();save()}
function cobrar(i){let x=c[i];let ref=x.ult||'sem referência'; let msg=encodeURIComponent('Olá '+x.n+', cobrança referente a '+ref+' no valor de R$ '+x.val+'.');window.open('https://wa.me/?text='+msg,'_blank')}
function editarRef(i){let atual=c[i].ult||'';let nova=prompt('Editar referência da dívida (ex: 03/2026, 02-03/2026, 2 meses)',atual);if(nova!==null){c[i].ult=nova;save()}}
function cancelar(i){if(confirm('Cancelar cliente?')){c[i].cancelado=true;save()}}
function remover(i){if(confirm('Excluir cliente?')){c.splice(i,1);save()}}
function exportar(){let a=document.createElement('a');a.href='data:text/json;charset=utf-8,'+encodeURIComponent(JSON.stringify(c));a.download='backup_clientes.json';a.click()}
function render(){let ok='',late='';let em=0,at=0,total=0;for(let i=0;i<c.length;i++){let x=c[i];let s=status(x);if(s==='cancelado')continue;let venc=x.v?('Vencimento: dia '+x.v):'Sem data';let ref=x.ult?('Ref dívida: '+x.ult):'Ref dívida: não definida';let base=`<b>${x.n}</b><br><span class='small'>${venc}</span><br><span class='small'>${ref}</span><br>R$ ${x.val}`;let btn=`<div class='rowbtn'><button onclick='cobrar(${i})'>Cobrar</button><button onclick='pagar(${i})'>Pago</button><button onclick='cancelar(${i})'>Cancelar</button><button onclick='editarRef(${i})'>Editar Dívida</button></div>`;if(s==='ok'){em++;ok+=`<div class='cliente verde'>${base}${btn}</div>`}else{at++;total+=Number(x.val||0);late+=`<div class='cliente vermelho'>${base}${btn}</div>`}}
emdia.innerHTML=ok||'Nenhum';atrasados.innerHTML=late||'Nenhum';t1.innerText=c.filter(x=>!x.cancelado).length;t2.innerText=em;t3.innerText=at;t4.innerText=total.toFixed(2)}
console.assert(Array.isArray(baseClientes()),'base ok');console.assert(typeof cancelar==='function','cancelar ok');render();</script></body></html>
